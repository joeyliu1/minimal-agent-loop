spring:
  application:
    name: minimal-agent-loop

  # 通义千问 API配置
  ai:
    dashscope:
      api-key: ${AI_DASHSCOPE_API_KEY}

    # MiniMax MCP 配置
    mcp:
      servers:
        minimax:
          command: uvx
          args:
            - minimax-coding-plan-mcp
            - -y
          env:
            MINIMAX_API_KEY: ${MINIMAX_API_KEY}
            MINIMAX_API_HOST: https://api.minimaxi.com
            MINIMAX_MCP_BASE_PATH: ${MINIMAX_MCP_BASE_PATH:}

    # 对话记忆配置 (in-memory fallback when no DB)
    # chat:
    #   memory:
    #     repository:
    #       jdbc:
    #         initialize-schema: always

  # 数据库配置 (可选，不配置则用内存)
  # datasource:
  #   url: jdbc:mysql://localhost:3306/minimal_agent?characterEncoding=utf8&useSSL=false&serverTimezone=UTC
  #   username: root
  #   password: ${MYSQL_PASSWORD:123456}
  #   driver-class-name: com.mysql.cj.jdbc.Driver

server:
  port: 8080

agent:
  max-steps: 10
  timeout-seconds: 120

logging:
  level:
    root: INFO
    com.agent: DEBUG