spring:
  application:
    name: minimal-agent-loop

  # MySQL 数据库配置
  datasource:
    url: jdbc:mysql://localhost:3306/minimal-agent-loop?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root
    password: 123456
    driver-class-name: com.mysql.cj.jdbc.Driver

  # 启动时自动创建数据库表
  sql:
    init:
      mode: always

  # 通义千问 API配置
  ai:
    dashscope:
      api-key: ${AI_DASHSCOPE_API_KEY}
      base-url: ${BASE_URL:https://dashscope.aliyuncs.com}
      chat:
        options:
          model: ${MODEL:qwen3-max}
          temperature: ${TEMPERATURE:0.7}
      embedding:
        options:
          model: ${EMBEDDING_MODEL:text-embedding-v3}

server:
  port: 8085

agent:
  max-steps: 10
  timeout-seconds: 120

logging:
  level:
    root: INFO
    com.agent: DEBUG