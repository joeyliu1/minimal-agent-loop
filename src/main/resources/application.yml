spring:
  application:
    name: minimal-agent-loop

  # 通义千问 API配置
  ai:
    dashscope:
      api-key: ${AI_DASHSCOPE_API_KEY}
      base-url: ${BASE_URL:https://dashscope.aliyuncs.com}
      chat:
        options:
          model: ${MODEL:qwen-turbo}
          temperature: ${TEMPERATURE:0.7}
      embedding:
        options:
          model: ${EMBEDDING_MODEL:text-embedding-v3}

# Milvus Vector Store 配置 (RAG)
milvus:
  host: ${MILVUS_HOST:localhost}
  port: ${MILVUS_PORT:19530}
  collection: ${MILVUS_COLLECTION:agent_docs}
  dimension: ${MILVUS_DIMENSION:1536}
  username: ${MILVUS_USERNAME:}
  password: ${MILVUS_PASSWORD:}

server:
  port: 8085

agent:
  max-steps: 10
  timeout-seconds: 120

logging:
  level:
    root: INFO
    com.agent: DEBUG