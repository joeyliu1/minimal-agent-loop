<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Loop - AI Agent 控制台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 20px 30px;
            border-bottom: 1px solid #2a2a4a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        header h1 {
            font-size: 24px;
            font-weight: 600;
            background: linear-gradient(90deg, #00d4ff, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .status {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 14px;
            color: #888;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #4ade80;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .container {
            display: flex;
            flex: 1;
            overflow: hidden;
        }
        
        aside {
            width: 320px;
            background: #13132a;
            border-right: 1px solid #2a2a4a;
            padding: 20px;
            overflow-y: auto;
        }
        
        aside h3 {
            font-size: 14px;
            color: #888;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
        }
        
        .tool-section {
            margin-bottom: 25px;
        }
        
        .tool-section h4 {
            font-size: 13px;
            color: #00d4ff;
            margin-bottom: 10px;
            padding-left: 10px;
            border-left: 2px solid #00d4ff;
        }
        
        .tool-btn {
            display: block;
            width: 100%;
            padding: 12px 15px;
            margin-bottom: 8px;
            background: #1e1e3f;
            border: 1px solid #2a2a4a;
            border-radius: 8px;
            color: #e0e0e0;
            font-size: 14px;
            cursor: pointer;
            text-align: left;
            transition: all 0.2s;
        }
        
        .tool-btn:hover {
            background: #2a2a5a;
            border-color: #00d4ff;
            transform: translateX(5px);
        }

        .add-form {
            display: flex;
            flex-direction: column;
            gap: 8px;
            margin-bottom: 12px;
        }

        .add-form input {
            padding: 10px 12px;
            background: #1e1e3f;
            border: 1px solid #2a2a4a;
            border-radius: 8px;
            color: #e0e0e0;
            font-size: 13px;
            outline: none;
        }

        .add-form input:focus {
            border-color: #00d4ff;
        }

        .add-form input::placeholder {
            color: #555;
        }
        
        .tool-btn .desc {
            display: block;
            font-size: 12px;
            color: #666;
            margin-top: 4px;
        }
        
        main {
            flex: 1;
            display: flex;
            flex-direction: column;
            padding: 20px;
            overflow: hidden;
        }
        
        .chat-area {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            background: #0d0d1a;
            border-radius: 12px;
            border: 1px solid #2a2a4a;
            margin-bottom: 15px;
        }
        
        .message {
            display: flex;
            gap: 12px;
            margin-bottom: 20px;
            animation: fadeIn 0.3s ease;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .message.user {
            flex-direction: row-reverse;
        }
        
        .avatar {
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            font-size: 14px;
            flex-shrink: 0;
        }
        
        .message.user .avatar {
            background: linear-gradient(135deg, #7c3aed, #a855f7);
        }
        
        .message.agent .avatar {
            background: linear-gradient(135deg, #00d4ff, #0099cc);
        }
        
        .message-content {
            max-width: 70%;
            padding: 12px 18px;
            border-radius: 12px;
            line-height: 1.6;
            font-size: 14px;
        }
        
        .message.user .message-content {
            background: #1e1e3f;
            border-radius: 12px 12px 4px 12px;
        }
        
        .message.agent .message-content {
            background: #16213e;
            border-radius: 12px 12px 12px 4px;
        }
        
        .message-content code {
            background: #0a0a15;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: 'Fira Code', monospace;
            font-size: 13px;
        }
        
        .message-content pre {
            background: #0a0a15;
            padding: 12px;
            border-radius: 8px;
            overflow-x: auto;
            margin: 8px 0;
        }
        
        .input-area {
            display: flex;
            gap: 12px;
        }
        
        #messageInput {
            flex: 1;
            padding: 15px 20px;
            background: #1e1e3f;
            border: 1px solid #2a2a4a;
            border-radius: 12px;
            color: #e0e0e0;
            font-size: 14px;
            outline: none;
            transition: border-color 0.2s;
        }
        
        #messageInput:focus {
            border-color: #00d4ff;
        }
        
        #messageInput::placeholder {
            color: #555;
        }
        
        #sendBtn {
            padding: 15px 30px;
            background: linear-gradient(135deg, #00d4ff, #0099cc);
            border: none;
            border-radius: 12px;
            color: #0f0f1a;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        
        #sendBtn:hover {
            transform: scale(1.05);
            box-shadow: 0 5px 20px rgba(0, 212, 255, 0.3);
        }
        
        #sendBtn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }
        
        .quick-actions {
            display: flex;
            gap: 8px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }
        
        .quick-btn {
            padding: 8px 16px;
            background: #1e1e3f;
            border: 1px solid #2a2a4a;
            border-radius: 20px;
            color: #888;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .quick-btn:hover {
            background: #2a2a5a;
            color: #00d4ff;
            border-color: #00d4ff;
        }
        
        .typing {
            display: flex;
            align-items: center;
            gap: 8px;
            color: #666;
            font-size: 14px;
            padding: 10px 0;
        }
        
        .typing-dots {
            display: flex;
            gap: 4px;
        }
        
        .typing-dots span {
            width: 6px;
            height: 6px;
            background: #00d4ff;
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }
        
        .typing-dots span:nth-child(1) { animation-delay: 0s; }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
        
        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0.8); opacity: 0.5; }
            40% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>
    <header>
        <h1>🤖 Agent Loop 控制台</h1>
        <div class="status">
            <div class="status-dot"></div>
            <span>服务正常</span>
        </div>
    </header>
    
    <div class="container">
        <aside>
            <div class="tool-section">
                <h4>🧮 数学计算</h4>
                <button class="tool-btn" onclick="sendMessage('2+2等于几？')">
                    基本运算
                    <span class="desc">2+2, 15*25+100 等</span>
                </button>
                <button class="tool-btn" onclick="sendMessage('计算 (100 + 200) / 3 的结果')">
                    复杂表达式
                    <span class="desc">括号、混合运算</span>
                </button>
            </div>
            
            <div class="tool-section">
                <h4>📅 时间查询</h4>
                <button class="tool-btn" onclick="sendMessage('现在几点？')">
                    当前时间
                    <span class="desc">查询系统时间</span>
                </button>
                <button class="tool-btn" onclick="sendMessage('今天是几号？')">
                    当前日期
                    <span class="desc">查询年月日</span>
                </button>
            </div>
            
            <div class="tool-section">
                <h4>📚 知识库</h4>
                <div class="add-form">
                    <input type="text" id="docContent" placeholder="输入文档内容..." />
                    <input type="text" id="docSource" placeholder="来源（可选）" />
                    <button class="tool-btn" onclick="addDocument()">➕ 添加</button>
                </div>
                <button class="tool-btn" onclick="listDocuments()">📋 查看条目</button>
                <button class="tool-btn" onclick="clearKnowledgeBase()">🗑️ 清空知识库</button>
            </div>
            
            <div class="tool-section">
                <h4>🌐 网页搜索</h4>
                <button class="tool-btn" onclick="sendMessage('帮我搜索一下 AI Agent 的最新发展')">
                    AI Agent 资讯
                    <span class="desc">搜索网络内容</span>
                </button>
                <button class="tool-btn" onclick="sendMessage('搜索一下什么是 RAG 技术')">
                    RAG 技术
                    <span class="desc">了解 RAG 概念</span>
                </button>
            </div>
        </aside>
        
        <main>
            <div class="quick-actions">
                <button class="quick-btn" onclick="clearChat()">🗑️ 清空对话</button>
                <button class="quick-btn" onclick="sendMessage('你是谁？')">❓ 你是谁</button>
                <button class="quick-btn" onclick="sendMessage('今天天气怎么样？')">🌤️ 天气</button>
            </div>
            
            <div class="chat-area" id="chatArea">
                <div class="message agent">
                    <div class="avatar">AI</div>
                    <div class="message-content">
                        欢迎使用 <strong>Agent Loop 控制台</strong>！👋<br><br>
                        我是一个 AI Agent，支持多种工具：<br>
                        • 🧮 数学计算<br>
                        • 📅 时间查询<br>
                        • 📚 知识库检索<br>
                        • 🌐 网页搜索<br><br>
                        点击左侧按钮或直接输入问题开始体验！
                    </div>
                </div>
            </div>
            
            <div class="input-area">
                <input type="text" id="messageInput" placeholder="输入问题，按 Enter 发送..." onkeypress="handleKeyPress(event)">
                <button id="sendBtn" onclick="sendMessage()">发送</button>
            </div>
        </main>
    </div>
    
    <script>
        let isLoading = false;
        
        function handleKeyPress(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                sendMessage();
            }
        }
        
        function sendMessage(msg) {
            const input = document.getElementById('messageInput');
            const message = msg || input.value.trim();
            if (!message || isLoading) return;
            
            addMessage(message, 'user');
            input.value = '';
            setLoading(true);
            
            fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message })
            })
            .then(res => res.json())
            .then(data => {
                addMessage(data.response || '无响应', 'agent');
            })
            .catch(err => {
                addMessage('错误: ' + err.message, 'agent');
            })
            .finally(() => setLoading(false));
        }
        
        function addMessage(content, type) {
            const chatArea = document.getElementById('chatArea');
            const avatar = type === 'user' ? 'U' : 'AI';
            const div = document.createElement('div');
            div.className = `message ${type}`;
            div.innerHTML = `
                <div class="avatar">${avatar}</div>
                <div class="message-content">${formatContent(content)}</div>
            `;
            chatArea.appendChild(div);
            chatArea.scrollTop = chatArea.scrollHeight;
        }
        
        function formatContent(content) {
            return content
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/`([^`]+)`/g, '<code>$1</code>')
                .replace(/\n/g, '<br>');
        }
        
        function setLoading(loading) {
            isLoading = loading;
            const btn = document.getElementById('sendBtn');
            btn.disabled = loading;
            if (loading) {
                const chatArea = document.getElementById('chatArea');
                const typing = document.createElement('div');
                typing.id = 'typing';
                typing.className = 'message agent';
                typing.innerHTML = `
                    <div class="avatar">AI</div>
                    <div class="message-content">
                        <div class="typing">
                            <div class="typing-dots"><span></span><span></span><span></span></div>
                            思考中...
                        </div>
                    </div>
                `;
                chatArea.appendChild(typing);
                chatArea.scrollTop = chatArea.scrollHeight;
            } else {
                const typing = document.getElementById('typing');
                if (typing) typing.remove();
            }
        }
        
        function clearChat() {
            document.getElementById('chatArea').innerHTML = `
                <div class="message agent">
                    <div class="avatar">AI</div>
                    <div class="message-content">对话已清空，开始新对话吧！</div>
                </div>
            `;
        }

        function addDocument() {
            const content = document.getElementById('docContent').value.trim();
            const source = document.getElementById('docSource').value.trim() || '用户添加';
            if (!content) {
                alert('请输入文档内容');
                return;
            }
            fetch('/api/rag/add', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content, source })
            })
            .then(res => res.json())
            .then(data => {
                addMessage(`[知识库] ${data.message}`, 'agent');
                document.getElementById('docContent').value = '';
                document.getElementById('docSource').value = '';
            })
            .catch(err => addMessage('[错误] ' + err.message, 'agent'));
        }

        function listDocuments() {
            fetch('/api/rag/list')
            .then(res => res.json())
            .then(data => {
                if (data.count === 0) {
                    addMessage('[知识库] 当前知识库为空', 'agent');
                } else {
                    let msg = `[知识库] 共 ${data.count} 条文档：\n`;
                    data.documents.forEach((doc, i) => {
                        msg += `\n${i + 1}. [${doc.source}] ${doc.content}`;
                    });
                    addMessage(msg, 'agent');
                }
            })
            .catch(err => addMessage('[错误] ' + err.message, 'agent'));
        }

        function clearKnowledgeBase() {
            if (!confirm('确定要清空知识库吗？此操作不可恢复。')) return;
            fetch('/api/rag/clear', { method: 'DELETE' })
            .then(res => res.json())
            .then(data => addMessage('[知识库] ' + data.message, 'agent'))
            .catch(err => addMessage('[错误] ' + err.message, 'agent'));
        }

        document.getElementById('messageInput').focus();
    </script>
</body>
</html>
