<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Agent Loop - AI Agent 控制台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 20px 30px;
            border-bottom: 1px solid #2a2a4a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        header h1 {
            font-size: 24px;
            font-weight: 600;
            background: linear-gradient(90deg, #00d4ff, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .status { display: flex; align-items: center; gap: 8px; font-size: 14px; color: #888; }
        .status-dot { width: 8px; height: 8px; border-radius: 50%; background: #4ade80; animation: pulse 2s infinite; }
        @keyframes pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }

        .container { display: flex; flex: 1; overflow: hidden; }

        aside { width: 320px; background: #13132a; border-right: 1px solid #2a2a4a; padding: 20px; overflow-y: auto; }
        aside h3 { font-size: 14px; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; }
        .tool-section { margin-bottom: 25px; }
        .tool-section h4 { font-size: 13px; color: #00d4ff; margin-bottom: 10px; padding-left: 10px; border-left: 2px solid #00d4ff; }
        .tool-btn {
            display: block; width: 100%; padding: 12px 15px; margin-bottom: 8px;
            background: #1e1e3f; border: 1px solid #2a2a4a; border-radius: 8px;
            color: #e0e0e0; font-size: 14px; cursor: pointer; text-align: left; transition: all 0.2s;
        }
        .tool-btn:hover { background: #2a2a5a; border-color: #00d4ff; transform: translateX(5px); }
        .tool-btn .desc { display: block; font-size: 12px; color: #666; margin-top: 4px; }

        main { flex: 1; display: flex; flex-direction: column; padding: 20px; overflow: hidden; }

        /* Chat page */
        #chatPage { display: flex; flex-direction: column; height: 100%; }
        .quick-actions { display: flex; gap: 8px; margin-bottom: 15px; flex-wrap: wrap; }
        .quick-btn {
            padding: 8px 16px; background: #1e1e3f; border: 1px solid #2a2a4a;
            border-radius: 20px; color: #888; font-size: 13px; cursor: pointer; transition: all 0.2s;
        }
        .quick-btn:hover { background: #2a2a5a; color: #00d4ff; border-color: #00d4ff; }
        .chat-area {
            flex: 1; overflow-y: auto; padding: 20px; background: #0d0d1a;
            border-radius: 12px; border: 1px solid #2a2a4a; margin-bottom: 15px;
        }
        .message { display: flex; gap: 12px; margin-bottom: 20px; animation: fadeIn 0.3s ease; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .message.user { flex-direction: row-reverse; }
        .avatar {
            width: 36px; height: 36px; border-radius: 50%; display: flex; align-items: center;
            justify-content: center; font-weight: 600; font-size: 14px; flex-shrink: 0;
        }
        .message.user .avatar { background: linear-gradient(135deg, #7c3aed, #a855f7); }
        .message.agent .avatar { background: linear-gradient(135deg, #00d4ff, #0099cc); }
        .message-content { max-width: 70%; padding: 12px 18px; border-radius: 12px; line-height: 1.6; font-size: 14px; }
        .message.user .message-content { background: #1e1e3f; border-radius: 12px 12px 4px 12px; }
        .message.agent .message-content { background: #16213e; border-radius: 12px 12px 12px 4px; }
        .message-content code { background: #0a0a15; padding: 2px 6px; border-radius: 4px; font-family: 'Fira Code', monospace; font-size: 13px; }
        .message-content pre { background: #0a0a15; padding: 12px; border-radius: 8px; overflow-x: auto; margin: 8px 0; }
        .input-area { display: flex; gap: 12px; }
        #messageInput {
            flex: 1; padding: 15px 20px; background: #1e1e3f; border: 1px solid #2a2a4a;
            border-radius: 12px; color: #e0e0e0; font-size: 14px; outline: none; transition: border-color 0.2s;
        }
        #messageInput:focus { border-color: #00d4ff; }
        #messageInput::placeholder { color: #555; }
        #sendBtn {
            padding: 15px 30px; background: linear-gradient(135deg, #00d4ff, #0099cc);
            border: none; border-radius: 12px; color: #0f0f1a; font-weight: 600; font-size: 14px; cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
        }
        #sendBtn:hover { transform: scale(1.05); box-shadow: 0 5px 20px rgba(0, 212, 255, 0.3); }
        #sendBtn:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .typing { display: flex; align-items: center; gap: 8px; color: #666; font-size: 14px; padding: 10px 0; }
        .typing-dots { display: flex; gap: 4px; }
        .typing-dots span { width: 6px; height: 6px; background: #00d4ff; border-radius: 50%; animation: bounce 1.4s infinite ease-in-out; }
        .typing-dots span:nth-child(1) { animation-delay: 0s; }
        .typing-dots span:nth-child(2) { animation-delay: 0.2s; }
        .typing-dots span:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0.8); opacity: 0.5; } 40% { transform: scale(1); opacity: 1; } }

        /* Knowledge page */
        #knowledgePage { display: none; height: 100%; overflow-y: auto; }
        .knowledge-header { display: flex; gap: 12px; margin-bottom: 20px; align-items: center; }
        .knowledge-header .btn {
            padding: 8px 16px; border-radius: 8px; font-size: 13px; cursor: pointer;
            border: 1px solid #2a2a4a; background: #1e1e3f; color: #888; transition: all 0.2s;
        }
        .knowledge-header .btn:hover { border-color: #00d4ff; color: #00d4ff; }
        .knowledge-header .btn.active { background: #00d4ff; color: #0f0f1a; border-color: #00d4ff; }

        /* Drop zone */
        .drop-zone {
            border: 2px dashed #2a2a4a; border-radius: 12px; padding: 40px; text-align: center;
            cursor: pointer; transition: all 0.3s; background: #1a1a2e; margin-bottom: 20px;
        }
        .drop-zone:hover, .drop-zone.dragover { border-color: #00d4ff; background: rgba(0, 212, 255, 0.05); }
        .drop-zone .icon { font-size: 48px; margin-bottom: 15px; }
        .drop-zone .title { font-size: 16px; font-weight: 600; color: #e0e0e0; margin-bottom: 8px; }
        .drop-zone .subtitle { font-size: 13px; color: #666; margin-bottom: 15px; }
        .drop-zone .formats { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; }
        .drop-zone .format-tag { padding: 3px 10px; background: #2a2a4a; border-radius: 4px; font-size: 11px; color: #888; }
        .drop-zone input[type="file"] { display: none; }

        /* File list */
        .file-list { margin-bottom: 15px; }
        .file-item {
            display: flex; align-items: center; gap: 12px; padding: 10px 15px;
            background: #1e1e3f; border-radius: 8px; margin-bottom: 8px; font-size: 13px;
        }
        .file-item .name { flex: 1; color: #e0e0e0; }
        .file-item .size { color: #666; font-size: 12px; }
        .file-item .status { font-size: 12px; }
        .file-item .status.ok { color: #00d4ff; }
        .file-item .status.err { color: #dc2626; }
        .file-item .remove { background: none; border: none; color: #666; cursor: pointer; font-size: 16px; }
        .file-item .remove:hover { color: #dc2626; }

        /* Doc list */
        .doc-list { max-height: 300px; overflow-y: auto; }
        .doc-item {
            background: #1e1e3f; border: 1px solid #2a2a4a; border-radius: 10px;
            padding: 15px; margin-bottom: 12px; display: flex; justify-content: space-between; align-items: flex-start; gap: 15px;
        }
        .doc-item:hover { border-color: #3a3a6a; }
        .doc-content { flex: 1; }
        .doc-content .text { font-size: 14px; line-height: 1.6; color: #e0e0e0; word-break: break-word; max-height: 80px; overflow: hidden; }
        .doc-content .source { font-size: 12px; color: #00d4ff; margin-top: 8px; }
        .doc-content .meta { font-size: 11px; color: #555; margin-top: 5px; }
        .doc-actions { display: flex; gap: 8px; flex-shrink: 0; }
        .doc-actions button {
            padding: 8px 12px; background: #2a2a4a; border: none; border-radius: 6px;
            color: #e0e0e0; font-size: 12px; cursor: pointer; transition: all 0.2s;
        }
        .doc-actions button:hover { background: #dc2626; }
        .empty-state { text-align: center; padding: 30px; color: #555; }
        .empty-state .icon { font-size: 36px; margin-bottom: 10px; }

        /* Manual add */
        .add-form { display: flex; flex-direction: column; gap: 8px; margin-bottom: 15px; }
        .add-form input[type="text"] {
            padding: 10px 12px; background: #1e1e3f; border: 1px solid #2a2a4a;
            border-radius: 8px; color: #e0e0e0; font-size: 13px; outline: none; transition: border-color 0.2s;
        }
        .add-form input[type="text"]:focus { border-color: #00d4ff; }
        .add-form input[type="text"]::placeholder { color: #555; }
        .add-form textarea {
            padding: 10px 12px; background: #1e1e3f; border: 1px solid #2a2a4a;
            border-radius: 8px; color: #e0e0e0; font-size: 13px; outline: none; resize: vertical; min-height: 60px;
        }
        .add-form textarea:focus { border-color: #00d4ff; }
        .btn-row { display: flex; gap: 8px; }
        .btn {
            padding: 10px 20px; border-radius: 8px; font-size: 13px; font-weight: 600; cursor: pointer; transition: all 0.2s; border: none;
        }
        .btn-primary { background: linear-gradient(135deg, #00d4ff, #0099cc); color: #0f0f1a; }
        .btn-primary:hover { transform: scale(1.02); box-shadow: 0 5px 20px rgba(0, 212, 255, 0.3); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .btn-danger { background: #dc2626; color: white; }
        .btn-danger:hover { background: #b91c1c; }

        /* Stats */
        .stats { display: flex; gap: 15px; margin-bottom: 15px; }
        .stat { background: #1e1e3f; padding: 12px 20px; border-radius: 10px; text-align: center; }
        .stat .number { font-size: 24px; font-weight: 700; color: #00d4ff; }
        .stat .label { font-size: 12px; color: #666; margin-top: 4px; }

        /* Toast */
        .toast {
            position: fixed; bottom: 30px; right: 30px; padding: 15px 25px; background: #1e1e3f;
            border: 1px solid #00d4ff; border-radius: 10px; color: #e0e0e0; font-size: 14px;
            transform: translateY(100px); opacity: 0; transition: all 0.3s; z-index: 9999; max-width: 350px;
        }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast.error { border-color: #dc2626; }

        /* Section titles in knowledge page */
        .section-title { font-size: 16px; color: #00d4ff; margin-bottom: 15px; padding-bottom: 8px; border-bottom: 1px solid #2a2a4a; }
    </style>
</head>
<body>
    <header>
        <h1>🤖 Agent Loop 控制台</h1>
        <div class="status">
            <div class="status-dot"></div>
            <span>服务正常</span>
        </div>
    </header>

    <div class="container">
        <aside>
            <div class="tool-section">
                <h4>🧮 数学计算</h4>
                <button class="tool-btn" onclick="sendMessage('2+2等于几？')">
                    基本运算<span class="desc">2+2, 15*25+100 等</span>
                </button>
                <button class="tool-btn" onclick="sendMessage('计算 (100 + 200) / 3 的结果')">
                    复杂表达式<span class="desc">括号、混合运算</span>
                </button>
            </div>

            <div class="tool-section">
                <h4>📅 时间查询</h4>
                <button class="tool-btn" onclick="sendMessage('现在几点？')">
                    当前时间<span class="desc">查询系统时间</span>
                </button>
                <button class="tool-btn" onclick="sendMessage('今天是几号？')">
                    当前日期<span class="desc">查询年月日</span>
                </button>
            </div>

            <div class="tool-section">
                <h4>📚 知识库</h4>
                <button class="tool-btn" onclick="showKnowledgePage()">
                    📚 管理知识库<span class="desc">添加/删除/查看</span>
                </button>
            </div>

            <div class="tool-section">
                <h4>🌐 网页搜索</h4>
                <button class="tool-btn" onclick="sendMessage('帮我搜索一下 AI Agent 的最新发展')">
                    AI Agent 资讯<span class="desc">搜索网络内容</span>
                </button>
                <button class="tool-btn" onclick="sendMessage('搜索一下什么是 RAG 技术')">
                    RAG 技术<span class="desc">了解 RAG 概念</span>
                </button>
            </div>
        </aside>

        <main>
            <!-- Chat Page -->
            <div id="chatPage">
                <div class="quick-actions">
                    <button class="quick-btn" onclick="clearChat()">🗑️ 清空对话</button>
                    <button class="quick-btn" onclick="sendMessage('你是谁？')">❓ 你是谁</button>
                    <button class="quick-btn" onclick="sendMessage('今天天气怎么样？')">🌤️ 天气</button>
                </div>
                <div class="chat-area" id="chatArea">
                    <div class="message agent">
                        <div class="avatar">AI</div>
                        <div class="message-content">
                            欢迎使用 <strong>Agent Loop 控制台</strong>！👋<br><br>
                            我是一个 AI Agent，支持多种工具：<br>
                            • 🧮 数学计算<br>
                            • 📅 时间查询<br>
                            • 📚 知识库检索<br>
                            • 🌐 网页搜索<br><br>
                            点击左侧按钮或直接输入问题开始体验！
                        </div>
                    </div>
                </div>
                <div class="input-area">
                    <input type="text" id="messageInput" placeholder="输入问题，按 Enter 发送..." onkeypress="handleKeyPress(event)">
                    <button id="sendBtn" onclick="sendMessage()">发送</button>
                </div>
            </div>

            <!-- Knowledge Page -->
            <div id="knowledgePage">
                <div class="knowledge-header">
                    <button class="btn active" onclick="showKnowledgeTab('upload')" id="tabUpload">📤 上传文件</button>
                    <button class="btn" onclick="showKnowledgeTab('add')" id="tabAdd">✏️ 手动添加</button>
                    <button class="btn" onclick="showKnowledgeTab('list')" id="tabList">📋 文档列表</button>
                    <button class="btn" onclick="showChatPage()" style="margin-left: auto;">← 返回聊天</button>
                </div>

                <!-- Upload tab -->
                <div id="panelUpload">
                    <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
                        <div class="icon">📁</div>
                        <div class="title">点击选择文件 或 拖拽文件到此处</div>
                        <div class="subtitle">支持多个文件同时上传</div>
                        <div class="formats">
                            <span class="format-tag">PDF</span>
                            <span class="format-tag">Word</span>
                            <span class="format-tag">TXT</span>
                            <span class="format-tag">MD</span>
                            <span class="format-tag">JSON</span>
                            <span class="format-tag">XML</span>
                            <span class="format-tag">HTML</span>
                            <span class="format-tag">CSV</span>
                            <span class="format-tag">代码</span>
                            <span class="format-tag">ZIP</span>
                            <span class="format-tag">YAML</span>
                        </div>
                        <input type="file" id="fileInput" multiple>
                    </div>
                    <div class="file-list" id="fileList"></div>
                    <div class="btn-row">
                        <button class="btn btn-primary" id="uploadBtn" onclick="uploadFiles()" disabled>上传到知识库</button>
                    </div>
                </div>

                <!-- Add tab -->
                <div id="panelAdd" style="display:none;">
                    <div class="add-form">
                        <input type="text" id="docSource" placeholder="来源（标题）">
                        <textarea id="docContent" placeholder="文档内容..."></textarea>
                        <div class="btn-row">
                            <button class="btn btn-primary" onclick="addDocument()">添加</button>
                            <button class="btn btn-danger" onclick="clearAllDocs()">清空全部</button>
                        </div>
                    </div>
                </div>

                <!-- List tab -->
                <div id="panelList" style="display:none;">
                    <div class="stats">
                        <div class="stat"><div class="number" id="docCount">0</div><div class="label">文档数量</div></div>
                    </div>
                    <div class="doc-list" id="docList">
                        <div class="empty-state"><div class="icon">📭</div><div>知识库为空</div></div>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        let isLoading = false;
        let pendingFiles = [];
        let documents = [];

        function handleKeyPress(e) {
            if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
        }

        function sendMessage(msg) {
            const input = document.getElementById('messageInput');
            const message = msg || input.value.trim();
            if (!message || isLoading) return;
            addMessage(message, 'user');
            input.value = '';
            setLoading(true);
            fetch('/api/chat', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ message })
            })
            .then(res => res.json())
            .then(data => { addMessage(data.response || '无响应', 'agent'); })
            .catch(err => { addMessage('错误: ' + err.message, 'agent'); })
            .finally(() => setLoading(false));
        }

        function addMessage(content, type) {
            const chatArea = document.getElementById('chatArea');
            const avatar = type === 'user' ? 'U' : 'AI';
            const div = document.createElement('div');
            div.className = `message ${type}`;
            div.innerHTML = `<div class="avatar">${avatar}</div><div class="message-content">${formatContent(content)}</div>`;
            chatArea.appendChild(div);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function formatContent(content) {
            return content.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/`([^`]+)`/g,'<code>$1</code>').replace(/\n/g,'<br>');
        }

        function setLoading(loading) {
            isLoading = loading;
            const btn = document.getElementById('sendBtn');
            btn.disabled = loading;
            if (loading) {
                const chatArea = document.getElementById('chatArea');
                const typing = document.createElement('div');
                typing.id = 'typing';
                typing.className = 'message agent';
                typing.innerHTML = `<div class="avatar">AI</div><div class="message-content"><div class="typing"><div class="typing-dots"><span></span><span></span><span></span></div>思考中...</div></div>`;
                chatArea.appendChild(typing);
                chatArea.scrollTop = chatArea.scrollHeight;
            } else {
                const typing = document.getElementById('typing');
                if (typing) typing.remove();
            }
        }

        function clearChat() {
            document.getElementById('chatArea').innerHTML = `<div class="message agent"><div class="avatar">AI</div><div class="message-content">对话已清空，开始新对话吧！</div></div>`;
        }

        // Knowledge page
        function showKnowledgePage() {
            document.getElementById('chatPage').style.display = 'none';
            document.getElementById('knowledgePage').style.display = 'block';
            showKnowledgeTab('upload');
        }

        function showChatPage() {
            document.getElementById('knowledgePage').style.display = 'none';
            document.getElementById('chatPage').style.display = 'flex';
        }

        function showKnowledgeTab(tab) {
            ['upload','add','list'].forEach(t => {
                document.getElementById('panel' + t.charAt(0).toUpperCase() + t.slice(1)).style.display = 'none';
                document.getElementById('tab' + t.charAt(0).toUpperCase() + t.slice(1)).classList.remove('active');
            });
            document.getElementById('panel' + tab.charAt(0).toUpperCase() + tab.slice(1)).style.display = 'block';
            document.getElementById('tab' + tab.charAt(0).toUpperCase() + tab.slice(1)).classList.add('active');
            if (tab === 'list') loadDocuments();
        }

        // Drag & drop
        const dropZone = document.getElementById('dropZone');
        const fileInput = document.getElementById('fileInput');
        dropZone.addEventListener('dragover', e => { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', () => dropZone.classList.remove('dragover'));
        dropZone.addEventListener('drop', e => { e.preventDefault(); dropZone.classList.remove('dragover'); handleFiles(e.dataTransfer.files); });
        fileInput.addEventListener('change', e => handleFiles(e.target.files));

        function handleFiles(files) {
            for (const file of files) {
                if (!pendingFiles.some(f => f.name === file.name && f.size === file.size)) pendingFiles.push(file);
            }
            renderFileList();
        }

        function renderFileList() {
            const list = document.getElementById('fileList');
            const uploadBtn = document.getElementById('uploadBtn');
            uploadBtn.disabled = pendingFiles.length === 0;
            if (pendingFiles.length === 0) { list.innerHTML = ''; return; }
            list.innerHTML = pendingFiles.map((file, i) => `
                <div class="file-item">
                    <span class="status ok">⏳</span>
                    <span class="name">${escapeHtml(file.name)}</span>
                    <span class="size">${formatSize(file.size)}</span>
                    <button class="remove" onclick="removeFile(${i})">✕</button>
                </div>
            `).join('');
        }

        function removeFile(index) { pendingFiles.splice(index, 1); renderFileList(); }

        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function uploadFiles() {
            if (pendingFiles.length === 0) return;
            const uploadBtn = document.getElementById('uploadBtn');
            uploadBtn.disabled = true;
            uploadBtn.textContent = '上传中...';
            const formData = new FormData();
            pendingFiles.forEach(file => formData.append('files', file));
            try {
                const res = await fetch('/api/rag/upload', { method: 'POST', body: formData });
                const data = await res.json();
                const items = document.querySelectorAll('.file-item');
                const lines = data.message.split('\n').filter(l => l.trim());
                items.forEach((item, i) => {
                    const nameEl = item.querySelector('.name');
                    const statusEl = item.querySelector('.status');
                    if (lines[i]) {
                        const isOk = lines[i].startsWith('✓');
                        statusEl.textContent = isOk ? '✓' : '✗';
                        statusEl.className = 'status ' + (isOk ? 'ok' : 'err');
                    }
                });
                showToast(`成功 ${data.success} 个，失败 ${data.failed} 个`);
                pendingFiles = [];
                renderFileList();
            } catch (err) { showToast('上传失败: ' + err.message, true); }
            finally { uploadBtn.disabled = false; uploadBtn.textContent = '上传到知识库'; }
        }

        function loadDocuments() {
            fetch('/api/rag/list')
            .then(res => res.json())
            .then(data => { documents = data.documents || []; renderDocList(); })
            .catch(err => showToast('加载失败: ' + err.message, true));
        }

        function renderDocList() {
            document.getElementById('docCount').textContent = documents.length;
            const list = document.getElementById('docList');
            if (documents.length === 0) { list.innerHTML = '<div class="empty-state"><div class="icon">📭</div><div>知识库为空</div></div>'; return; }
            list.innerHTML = documents.map(doc => `
                <div class="doc-item">
                    <div class="doc-content">
                        <div class="text">${escapeHtml(doc.content)}</div>
                        <div class="source">来源: ${escapeHtml(doc.source)}</div>
                        <div class="meta">ID: ${doc.id.substring(0, 8)}...</div>
                    </div>
                    <div class="doc-actions"><button onclick="deleteDoc('${doc.id}')">删除</button></div>
                </div>
            `).join('');
        }

        function addDocument() {
            const content = document.getElementById('docContent').value.trim();
            const source = document.getElementById('docSource').value.trim() || '用户添加';
            if (!content) { showToast('请输入文档内容', true); return; }
            fetch('/api/rag/add', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content, source })
            })
            .then(res => res.json())
            .then(data => {
                showToast('添加成功');
                document.getElementById('docContent').value = '';
                loadDocuments();
            })
            .catch(err => showToast('添加失败: ' + err.message, true));
        }

        function deleteDoc(id) {
            if (!confirm('确定删除这条文档？')) return;
            fetch(`/api/rag/delete?id=${id}`, { method: 'DELETE' })
            .then(res => res.json())
            .then(data => { showToast('删除成功'); loadDocuments(); })
            .catch(err => showToast('删除失败: ' + err.message, true));
        }

        function clearAllDocs() {
            if (!confirm('确定清空全部文档？此操作不可恢复。')) return;
            fetch('/api/rag/clear', { method: 'DELETE' })
            .then(res => res.json())
            .then(data => { showToast('已清空全部文档'); loadDocuments(); })
            .catch(err => showToast('清空失败: ' + err.message, true));
        }

        function showToast(msg, isError = false) {
            const toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = 'toast' + (isError ? ' error' : '');
            toast.classList.add('show');
            setTimeout(() => toast.classList.remove('show'), 4000);
        }

        document.getElementById('messageInput').focus();
    </script>
</body>
</html>
