<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>知识库管理 - Agent Loop</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #0f0f1a;
            color: #e0e0e0;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        header {
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            padding: 20px 30px;
            border-bottom: 1px solid #2a2a4a;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }
        header h1 {
            font-size: 24px;
            font-weight: 600;
            background: linear-gradient(90deg, #00d4ff, #7c3aed);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        .back-btn {
            padding: 10px 20px;
            background: #1e1e3f;
            border: 1px solid #2a2a4a;
            border-radius: 8px;
            color: #e0e0e0;
            font-size: 14px;
            cursor: pointer;
            text-decoration: none;
            transition: all 0.2s;
        }
        .back-btn:hover { background: #2a2a5a; border-color: #00d4ff; }

        .container { flex: 1; display: flex; flex-direction: column; }

        aside {
            width: 320px;
            background: #13132a;
            border-right: 1px solid #2a2a4a;
            padding: 20px;
            overflow-y: auto;
            flex-shrink: 0;
            display: none;
        }
        @media (min-width: 768px) { aside { display: block; } }

        aside h3 { font-size: 14px; color: #888; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 15px; }
        .tool-section { margin-bottom: 25px; }
        .tool-section h4 { font-size: 13px; color: #00d4ff; margin-bottom: 10px; padding-left: 10px; border-left: 2px solid #00d4ff; }
        .tool-btn {
            display: block; width: 100%; padding: 12px 15px; margin-bottom: 8px;
            background: #1e1e3f; border: 1px solid #2a2a4a; border-radius: 8px;
            color: #e0e0e0; font-size: 14px; cursor: pointer; text-align: left; transition: all 0.2s;
        }
        .tool-btn:hover { background: #2a2a5a; border-color: #00d4ff; transform: translateX(5px); }
        .tool-btn .desc { display: block; font-size: 12px; color: #666; margin-top: 4px; }

        .content { flex: 1; padding: 30px; overflow-y: auto; }

        .section {
            background: #13132a;
            border: 1px solid #2a2a4a;
            border-radius: 12px;
            padding: 20px 25px;
            margin-bottom: 20px;
        }
        .section-title {
            font-size: 15px;
            font-weight: 600;
            color: #00d4ff;
            margin-bottom: 15px;
            padding-bottom: 10px;
            border-bottom: 1px solid #2a2a4a;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* Drop zone */
        .drop-zone {
            border: 2px dashed #2a2a4a;
            border-radius: 12px;
            padding: 35px;
            text-align: center;
            cursor: pointer;
            transition: all 0.3s;
            background: #1a1a2e;
        }
        .drop-zone:hover, .drop-zone.dragover {
            border-color: #00d4ff;
            background: rgba(0, 212, 255, 0.05);
        }
        .drop-zone .icon { font-size: 42px; margin-bottom: 12px; }
        .drop-zone .title { font-size: 15px; font-weight: 600; color: #e0e0e0; margin-bottom: 6px; }
        .drop-zone .subtitle { font-size: 13px; color: #666; margin-bottom: 12px; }
        .drop-zone .formats { display: flex; flex-wrap: wrap; gap: 5px; justify-content: center; }
        .drop-zone .format-tag { padding: 3px 10px; background: #2a2a4a; border-radius: 4px; font-size: 11px; color: #888; }
        .drop-zone input[type="file"] { display: none; }

        /* File list */
        .file-list { margin-top: 15px; }
        .file-item {
            display: flex; align-items: center; gap: 12px; padding: 10px 15px;
            background: #1e1e3f; border-radius: 8px; margin-bottom: 8px; font-size: 13px;
        }
        .file-item .name { flex: 1; color: #e0e0e0; word-break: break-all; }
        .file-item .size { color: #666; font-size: 12px; flex-shrink: 0; }
        .file-item .status { font-size: 12px; flex-shrink: 0; }
        .file-item .status.ok { color: #00d4ff; }
        .file-item .status.err { color: #dc2626; }
        .file-item .remove { background: none; border: none; color: #666; cursor: pointer; font-size: 16px; flex-shrink: 0; }
        .file-item .remove:hover { color: #dc2626; }

        /* Buttons */
        .btn-row { display: flex; gap: 10px; margin-top: 15px; }
        .btn {
            padding: 10px 20px; border-radius: 8px; font-size: 13px; font-weight: 600;
            cursor: pointer; transition: all 0.2s; border: none;
        }
        .btn-primary { background: linear-gradient(135deg, #00d4ff, #0099cc); color: #0f0f1a; }
        .btn-primary:hover { transform: scale(1.02); box-shadow: 0 5px 20px rgba(0, 212, 255, 0.3); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .btn-danger { background: #dc2626; color: white; }
        .btn-danger:hover { background: #b91c1c; }

        /* Add form */
        .add-form { display: flex; flex-direction: column; gap: 10px; }
        .add-form input[type="text"] {
            padding: 10px 14px; background: #1e1e3f; border: 1px solid #2a2a4a;
            border-radius: 8px; color: #e0e0e0; font-size: 13px; outline: none;
        }
        .add-form input[type="text"]:focus { border-color: #00d4ff; }
        .add-form input[type="text"]::placeholder { color: #555; }
        .add-form textarea {
            padding: 10px 14px; background: #1e1e3f; border: 1px solid #2a2a4a;
            border-radius: 8px; color: #e0e0e0; font-size: 13px; outline: none; resize: vertical; min-height: 70px;
        }
        .add-form textarea:focus { border-color: #00d4ff; }
        .add-form textarea::placeholder { color: #555; }

        /* Doc list */
        .doc-list { max-height: 280px; overflow-y: auto; }
        .doc-item {
            background: #1e1e3f; border: 1px solid #2a2a4a; border-radius: 10px;
            padding: 12px 15px; margin-bottom: 10px; display: flex; justify-content: space-between; align-items: flex-start; gap: 12px;
        }
        .doc-item:hover { border-color: #3a3a6a; }
        .doc-content { flex: 1; min-width: 0; }
        .doc-content .text { font-size: 13px; line-height: 1.6; color: #e0e0e0; word-break: break-word; max-height: 60px; overflow: hidden; }
        .doc-content .source { font-size: 12px; color: #00d4ff; margin-top: 6px; }
        .doc-content .meta { font-size: 11px; color: #555; margin-top: 4px; }
        .doc-actions { display: flex; gap: 6px; flex-shrink: 0; }
        .doc-actions button {
            padding: 6px 10px; background: #2a2a4a; border: none; border-radius: 6px;
            color: #e0e0e0; font-size: 12px; cursor: pointer; transition: all 0.2s;
        }
        .doc-actions button:hover { background: #dc2626; }
        .empty-state { text-align: center; padding: 25px; color: #555; font-size: 13px; }
        .empty-state .icon { font-size: 32px; margin-bottom: 8px; }

        /* Toast */
        .toast {
            position: fixed; bottom: 30px; right: 30px; padding: 14px 22px; background: #1e1e3f;
            border: 1px solid #00d4ff; border-radius: 10px; color: #e0e0e0; font-size: 13px;
            transform: translateY(100px); opacity: 0; transition: all 0.3s; z-index: 9999; max-width: 320px;
        }
        .toast.show { transform: translateY(0); opacity: 1; }
        .toast.error { border-color: #dc2626; }
    </style>
</head>
<body>
    <header>
        <h1>📚 知识库管理</h1>
        <button class="back-btn" onclick="history.back()">← 返回控制台</button>
    </header>

    <div class="container">
        <!-- 内容区：三段纵向排列 -->
        <div class="content">
            <!-- 上传区 -->
            <div class="section">
                <div class="section-title">📤 拖拽文件上传</div>
                <div class="drop-zone" id="dropZone" onclick="document.getElementById('fileInput').click()">
                    <div class="icon">📁</div>
                    <div class="title">点击选择文件 或 拖拽文件到此处</div>
                    <div class="subtitle">支持 PDF、Word、TXT、MD、JSON、XML、HTML、CSV、代码文件、ZIP、YAML、Properties</div>
                    <div class="formats">
                        <span class="format-tag">PDF</span><span class="format-tag">Word</span><span class="format-tag">TXT</span>
                        <span class="format-tag">MD</span><span class="format-tag">JSON</span><span class="format-tag">XML</span>
                        <span class="format-tag">HTML</span><span class="format-tag">CSV</span><span class="format-tag">代码</span>
                        <span class="format-tag">ZIP</span><span class="format-tag">YAML</span><span class="format-tag">Properties</span>
                    </div>
                    <input type="file" id="fileInput" multiple>
                </div>
                <div class="file-list" id="fileList"></div>
                <div class="btn-row">
                    <button class="btn btn-primary" id="uploadBtn" onclick="uploadFiles()" disabled>上传到知识库</button>
                </div>
            </div>

            <!-- 手动添加区 -->
            <div class="section">
                <div class="section-title">➕ 手动添加</div>
                <div class="add-form">
                    <input type="text" id="docSource" placeholder="来源（标题）">
                    <textarea id="docContent" placeholder="文档内容..."></textarea>
                    <div class="btn-row">
                        <button class="btn btn-primary" onclick="addDocument()">添加</button>
                        <button class="btn btn-danger" onclick="clearAllDocs()">清空</button>
                    </div>
                </div>
            </div>

            <!-- 文档列表区 -->
            <div class="section">
                <div class="section-title">
                    📋 文档列表
                    <span id="docCountBadge" style="font-size:12px;color:#666;font-weight:400;margin-left:6px;">0 条</span>
                </div>
                <div class="doc-list" id="docList">
                    <div class="empty-state"><div class="icon">📭</div><div>知识库为空，添加你的第一条文档吧</div></div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast" id="toast"></div>

    <script>
        var pendingFiles = [];
        var documents = [];

        // Toast
        function showToast(msg, isError) {
            var toast = document.getElementById('toast');
            toast.textContent = msg;
            toast.className = 'toast' + (isError ? ' error' : '');
            toast.classList.add('show');
            setTimeout(function() { toast.classList.remove('show'); }, 4000);
        }

        // Drag & drop
        var dropZone = document.getElementById('dropZone');
        var fileInput = document.getElementById('fileInput');
        dropZone.addEventListener('dragover', function(e) { e.preventDefault(); dropZone.classList.add('dragover'); });
        dropZone.addEventListener('dragleave', function() { dropZone.classList.remove('dragover'); });
        dropZone.addEventListener('drop', function(e) {
            e.preventDefault();
            dropZone.classList.remove('dragover');
            handleFiles(e.dataTransfer.files);
        });
        fileInput.addEventListener('change', function(e) { handleFiles(e.target.files); });

        function handleFiles(files) {
            for (var i = 0; i < files.length; i++) {
                var f = files[i];
                var exists = false;
                for (var j = 0; j < pendingFiles.length; j++) {
                    if (pendingFiles[j].name === f.name && pendingFiles[j].size === f.size) { exists = true; break; }
                }
                if (!exists) pendingFiles.push(f);
            }
            renderFileList();
        }

        function renderFileList() {
            var list = document.getElementById('fileList');
            var uploadBtn = document.getElementById('uploadBtn');
            uploadBtn.disabled = pendingFiles.length === 0;
            if (pendingFiles.length === 0) { list.innerHTML = ''; return; }
            var html = '';
            for (var i = 0; i < pendingFiles.length; i++) {
                var f = pendingFiles[i];
                html += '<div class="file-item">' +
                    '<span class="status ok">⏳</span>' +
                    '<span class="name">' + escapeHtml(f.name) + '</span>' +
                    '<span class="size">' + formatSize(f.size) + '</span>' +
                    '<button class="remove" onclick="removeFile(' + i + ')">✕</button>' +
                    '</div>';
            }
            list.innerHTML = html;
        }

        function removeFile(index) { pendingFiles.splice(index, 1); renderFileList(); }

        function formatSize(bytes) {
            if (bytes < 1024) return bytes + ' B';
            if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
            return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
        }

        function escapeHtml(text) {
            var d = document.createElement('div');
            d.textContent = text;
            return d.innerHTML;
        }

        async function uploadFiles() {
            if (pendingFiles.length === 0) return;
            var uploadBtn = document.getElementById('uploadBtn');
            uploadBtn.disabled = true;
            uploadBtn.textContent = '上传中...';
            var formData = new FormData();
            for (var i = 0; i < pendingFiles.length; i++) formData.append('files', pendingFiles[i]);
            try {
                var res = await fetch('/api/rag/upload', { method: 'POST', body: formData });
                var data = await res.json();
                var items = document.querySelectorAll('.file-item');
                var lines = data.message.split('\n');
                for (var i = 0; i < items.length; i++) {
                    var el = items[i].querySelector('.status');
                    if (lines[i]) {
                        var ok = lines[i].indexOf('✓') === 0;
                        el.textContent = ok ? '✓' : '✗';
                        el.className = 'status ' + (ok ? 'ok' : 'err');
                    }
                }
                showToast('成功 ' + data.success + ' 个，失败 ' + data.failed + ' 个');
                pendingFiles = [];
                renderFileList();
                loadDocuments();
            } catch (err) {
                showToast('上传失败: ' + err.message, true);
            } finally {
                uploadBtn.disabled = false;
                uploadBtn.textContent = '上传到知识库';
            }
        }

        function loadDocuments() {
            fetch('/api/rag/list')
                .then(function(res) { return res.json(); })
                .then(function(data) {
                    documents = data.documents || [];
                    renderDocList();
                })
                .catch(function(err) { showToast('加载失败: ' + err.message, true); });
        }

        function renderDocList() {
            document.getElementById('docCountBadge').textContent = documents.length + ' 条';
            var list = document.getElementById('docList');
            if (documents.length === 0) {
                list.innerHTML = '<div class="empty-state"><div class="icon">📭</div><div>知识库为空，添加你的第一条文档吧</div></div>';
                return;
            }
            var html = '';
            for (var i = 0; i < documents.length; i++) {
                var doc = documents[i];
                html += '<div class="doc-item">' +
                    '<div class="doc-content">' +
                    '<div class="text">' + escapeHtml(doc.content) + '</div>' +
                    '<div class="source">来源: ' + escapeHtml(doc.source) + '</div>' +
                    '<div class="meta">ID: ' + doc.id.substring(0, 8) + '...</div>' +
                    '</div>' +
                    '<div class="doc-actions"><button onclick="deleteDoc(\'' + doc.id + '\')">删除</button></div>' +
                    '</div>';
            }
            list.innerHTML = html;
        }

        function addDocument() {
            var content = document.getElementById('docContent').value.trim();
            var source = document.getElementById('docSource').value.trim() || '用户添加';
            if (!content) { showToast('请输入文档内容', true); return; }
            fetch('/api/rag/add', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content: content, source: source })
            })
            .then(function(res) { return res.json(); })
            .then(function() {
                showToast('添加成功');
                document.getElementById('docContent').value = '';
                loadDocuments();
            })
            .catch(function(err) { showToast('添加失败: ' + err.message, true); });
        }

        function deleteDoc(id) {
            if (!confirm('确定删除这条文档？')) return;
            fetch('/api/rag/delete?id=' + id, { method: 'DELETE' })
                .then(function(res) { return res.json(); })
                .then(function() { showToast('删除成功'); loadDocuments(); })
                .catch(function(err) { showToast('删除失败: ' + err.message, true); });
        }

        function clearAllDocs() {
            if (!confirm('确定清空全部文档？此操作不可恢复。')) return;
            fetch('/api/rag/clear', { method: 'DELETE' })
                .then(function(res) { return res.json(); })
                .then(function() { showToast('已清空全部文档'); loadDocuments(); })
                .catch(function(err) { showToast('清空失败: ' + err.message, true); });
        }

        loadDocuments();
    </script>
</body>
</html>
